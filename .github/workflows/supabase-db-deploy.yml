name: Deploy Supabase Database Migrations

on:
  workflow_dispatch:

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase db push --project-ref "${SUPABASE_PROJECT_REF}" --include-all

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Record deployment to Supabase
        continue-on-error: true
        run: node scripts/record_deploy.js backend deploy "Supabase DB migration を適用" "${{ github.actor }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
