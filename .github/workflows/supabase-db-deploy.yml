name: Deploy Supabase Database Migrations

on:
  workflow_dispatch:

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "${SUPABASE_ACCESS_TOKEN}" || (echo "Missing secret: SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "${SUPABASE_PROJECT_REF}" || (echo "Missing secret: SUPABASE_PROJECT_REF" && exit 1)
          test -n "${SUPABASE_DB_PASSWORD}" || (echo "Missing secret: SUPABASE_DB_PASSWORD" && exit 1)

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"

      - name: Push migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-all --password "${SUPABASE_DB_PASSWORD}"

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Record deployment to Supabase
        continue-on-error: true
        run: node scripts/record_deploy.js backend deploy "Supabase DB migration を適用" "${{ github.actor }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
