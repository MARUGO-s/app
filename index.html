    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>recipe management</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.style.background = '#fff';
        document.body.style.color = '#000';
        document.body.style.padding = '20px';
        document.body.innerHTML = '<h2>エラーが発生しました</h2><pre style="white-space:pre-wrap;font-size:12px">' + (e.message || '') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.style.background = '#fff';
        document.body.style.color = '#000';
        document.body.style.padding = '20px';
        document.body.innerHTML = '<h2>非同期エラー</h2><pre style="white-space:pre-wrap;font-size:12px">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
