  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        // Keep the app mounted. React's error boundary can show a recoverable UI,
        // whereas replacing document.body makes the login page unusable.
        console.error('[Unhandled window error]', e.error || e.message);
      });
      window.addEventListener('unhandledrejection', function(e) {
        // Do not overwrite the whole document for an async error. The originating
        // component keeps control of its own error UI and retry behavior.
        console.error('[Unhandled async error]', e.reason);
      });
    </script>
